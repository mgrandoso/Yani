
<style>
*{box-sizing:border-box;margin:0;padding:0}
#root{font-family:sans-serif;width:100%}
.screen{display:none;flex-direction:column}
.screen.active{display:flex}

#cover{background:#0d2b4e;border-radius:16px;overflow:hidden;position:relative;min-height:520px;align-items:center}
.cover-sky{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.star{position:absolute;background:#fff;border-radius:50%}
.cover-ground{position:absolute;bottom:0;left:0;right:0;height:80px;background:#071525}
.cover-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:28px 16px 0;width:100%}
.cover-flag{display:flex;width:80px;height:7px;border-radius:4px;overflow:hidden;margin-bottom:14px}
.cover-flag span{flex:1}
.cover-title-top{font-size:12px;letter-spacing:3px;color:#74acdf;text-transform:uppercase;font-weight:600;margin-bottom:5px}
.cover-title{font-size:clamp(28px,7vw,44px);font-weight:800;color:#fff;text-align:center;line-height:1.1;margin-bottom:4px}
.cover-sub{font-size:14px;color:#74acdf;opacity:.75;margin-bottom:22px}
.heroes-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;width:100%;padding:0 14px 28px;position:relative;z-index:2}
.hero-card{background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.14);border-radius:16px;width:clamp(130px,32vw,168px);cursor:pointer;transition:transform .15s,border-color .15s;overflow:hidden;position:relative;-webkit-tap-highlight-color:transparent}
.hero-card:hover{transform:translateY(-4px);border-color:rgba(116,172,223,.55)}
.hero-card:active{transform:scale(.97)}
.hero-art{width:100%;display:block;height:clamp(130px,22vw,165px)}
.hero-info{padding:9px 11px 11px}
.hero-name{font-size:clamp(12px,2.5vw,14px);font-weight:700;color:#fff;margin-bottom:2px;line-height:1.2}
.hero-role{font-size:11px;color:#74acdf;opacity:.8}
.hero-badge{position:absolute;top:7px;right:7px;background:#c8a020;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:9px}

#story{background:#0d2b4e;border-radius:16px;overflow:hidden}
.s-header{background:#091e3a;padding:11px 14px;display:flex;align-items:center;gap:10px}
.btn-back{background:rgba(116,172,223,0.18);border:1px solid rgba(116,172,223,0.35);color:#74acdf;font-size:13px;font-weight:600;padding:7px 13px;border-radius:20px;cursor:pointer;white-space:nowrap}
.btn-back:hover{background:rgba(116,172,223,0.28)}
.s-dots{display:flex;gap:6px;flex:1;justify-content:center;align-items:center}
.sdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.18);transition:all .25s}
.sdot.active{background:#74acdf;transform:scale(1.35)}
.sdot.done{background:#2a7a4f}
.chnum{font-size:11px;color:rgba(255,255,255,.35);margin-left:auto;white-space:nowrap}
.scene-wrap{width:100%;overflow:hidden;background:#0d2b4e}
.scene-svg{width:100%;display:block;height:clamp(155px,28vw,230px)}
.s-body{padding:16px}
.ch-badge{display:inline-flex;background:rgba(116,172,223,.15);border:1px solid rgba(116,172,223,.3);color:#74acdf;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase}
.ch-title{font-size:clamp(17px,4vw,22px);font-weight:800;color:#fff;margin-bottom:8px;line-height:1.2}
.ch-text{font-size:clamp(14px,3vw,16px);color:#c8dff0;line-height:1.65;margin-bottom:12px}
.fun-fact{display:flex;align-items:flex-start;gap:9px;background:rgba(200,160,32,.1);border:1.5px solid rgba(200,160,32,.3);border-radius:12px;padding:11px 13px;margin-bottom:16px;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent}
.fun-fact:hover{background:rgba(200,160,32,.18)}
.fact-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.fact-body{flex:1}
.fact-text{font-size:clamp(12px,2.4vw,13px);color:#f0d080;line-height:1.5}
.fact-hint{font-size:11px;color:rgba(240,208,128,.5);margin-top:4px;display:flex;align-items:center;gap:4px}
.s-controls{display:flex;align-items:center;gap:8px}
.btn-prev,.btn-next{background:rgba(255,255,255,.09);border:1.5px solid rgba(255,255,255,.25);color:#fff;border-radius:24px;padding:9px 15px;font-size:clamp(12px,2.4vw,14px);font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-prev:hover,.btn-next:hover{background:rgba(255,255,255,.18)}
.btn-prev:disabled,.btn-next:disabled{opacity:.28;cursor:not-allowed}
.btn-speak{display:flex;align-items:center;justify-content:center;gap:7px;background:#1a6abf;border:none;color:#fff;border-radius:24px;padding:10px 0;font-size:clamp(13px,2.6vw,15px);font-weight:700;cursor:pointer;flex:1;max-width:190px;transition:background .15s}
.btn-speak:hover{background:#1558a0}
.btn-speak.speaking{background:#9a1e1e}
@keyframes wav{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
.wb{width:3px;height:14px;background:#fff;border-radius:2px;display:inline-block;transform-origin:bottom;animation:wav .7s ease-in-out infinite}
.wb:nth-child(2){animation-delay:.12s}.wb:nth-child(3){animation-delay:.24s}.wb:nth-child(4){animation-delay:.12s}
</style>

<div id="root">
  <div id="cover" class="screen active">

    <div class="scene-wrap"><svg id="scene-svg" class="scene-svg" xmlns="http://www.w3.org/2000/svg"></svg></div>

        <button class="btn-speak" id="btn-speak"><span style="font-size:16px">🔊</span><span id="speak-lbl"> Escuchar</span></button>

      </div>
    </div>
  </div>
</div>

      {badge:'Cap. 1 · Nacimiento',title:'El niño estudioso',text:'Manuel Belgrano nació el 3 de junio de 1770 en Buenos Aires. Era un chico muy curioso y estudioso. Su familia pudo mandarlo a estudiar a España, donde aprendió economía, leyes y filosofía. Soñaba con un país más justo.',icon:'📚',fact:'Belgrano habló varios idiomas: castellano, latín, francés e italiano. ¡Era muy inteligente!',

      {badge:'Cap. 2 · Las ideas',title:'Las ideas que cambian el mundo',text:'Belgrano creó uno de los primeros periódicos del país. Escribía sus ideas para que todos pudieran leerlas. Quería que los niños fueran a la escuela. Donó todo su dinero de premios militares para construir cuatro escuelas.',icon:'📰',fact:'Belgrano donó el dinero de sus premios militares para construir cuatro escuelas en el norte de Argentina.',

      {badge:'Cap. 3 · La bandera',title:'Nace la bandera argentina',text:'El 27 de febrero de 1812, a orillas del río Paraná, Manuel Belgrano desplegó por primera vez la bandera celeste y blanca. Eran los colores del cielo y las nubes. Los soldados se emocionaron mucho.',icon:'🏳️',fact:'El 27 de febrero se celebra el Día de la Bandera en toda Argentina. ¡Es feriado nacional!',

      {badge:'Cap. 4 · El general',title:'Defendiendo la patria',text:'Belgrano fue un valiente general. Lideró el Éxodo Jujeño: cuando el enemigo avanzaba, pidió a toda la población que abandonara sus casas. Fue un acto enorme de sacrificio y patriotismo.',icon:'🦁',fact:'El 23 de agosto se celebra el Día del Éxodo Jujeño en la provincia de Jujuy.',

      {badge:'Cap. 5 · Su legado',title:'Un héroe que vivió por su país',text:'Manuel Belgrano murió el 20 de junio de 1820, pobre y enfermo, después de entregar todo por su patria. No solo nos dio nuestros colores nacionales: nos enseñó que el saber y la honestidad construyen una nación.',icon:'🌠',fact:'Belgrano fue tan generoso que cuando murió casi no tenía dinero. Había donado todo al país que amaba.',

    chapters:[
      {badge:'Cap. 1 · Nacimiento',title:'El niño de Tucumán',text:'Juan Bautista Alberdi nació el 29 de agosto de 1810 en Tucumán, el mismo año en que Argentina comenzó su camino hacia la libertad. Quedó huérfano de madre siendo muy pequeño. Era un niño curioso que amaba la música y los libros.',icon:'🎵',fact:'Alberdi era un excelente pianista. ¡Tocaba tan bien que dio conciertos públicos cuando era joven!',

      {badge:'Cap. 2 · El estudiante',title:'Aprendiendo en Buenos Aires',text:'Alberdi viajó a Buenos Aires para estudiar leyes y filosofía. Allí conoció a los pensadores más importantes de su época. Leía todo lo que podía: libros de Europa, ideas nuevas, constituciones de otros países.',icon:'🏛️',fact:'Alberdi estudió en la Universidad de Buenos Aires cuando tenía apenas 14 años. ¡Era muy adelantado para su edad!',

      {badge:'Cap. 3 · El exilio',title:'Pensar desde lejos',text:'Por sus ideas políticas, Alberdi vivió muchos años fuera de Argentina: en Uruguay, Chile y Europa. Pero nunca dejó de pensar en su país. Escribía libros y cartas con propuestas para construir una Argentina mejor.',icon:'✈️',fact:'Alberdi vivió en el exilio más de 30 años, pero nunca dejó de escribir y luchar por las ideas que amaba.',

      {badge:'Cap. 4 · El libro',title:'Bases para una Constitución',text:'En 1852 escribió su libro más famoso: Bases y puntos de partida para la organización política de la República Argentina. En ese libro propuso cómo debía organizarse el país y los derechos de todos.',icon:'📖',fact:'La famosa frase "Gobernar es poblar" la dijo Alberdi en ese libro. Quería que llegaran personas de todo el mundo a construir Argentina.',

var curHero = 0, cur = 0, speaking = false, factSpeaking = false;

function makeStar(){
  var sky = document.getElementById('sky');
  for(var i=0;i<55;i++){
    var s=document.createElement('div');s.className='star';
    var sz=Math.random()*2+0.6;
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+(Math.random()*62)+'%;left:'+(Math.random()*100)+'%;opacity:'+(Math.random()*0.6+0.2);
    sky.appendChild(s);
  }
}

function buildCards(){
  var grid=document.getElementById('heroes-grid');
  for(var i=0;i<HEROES.length;i++){
    (function(idx){
      var h=HEROES[idx];
      var card=document.createElement('div');
      card.className='hero-card';
      card.addEventListener('click',function(){ startHero(idx); });
      var artEl=document.createElementNS('http://www.w3.org/2000/svg','svg');
      artEl.setAttribute('viewBox','0 0 168 165');
      artEl.setAttribute('xmlns','http://www.w3.org/2000/svg');
      artEl.className='hero-art';
      h.drawCard(artEl);
      card.appendChild(artEl);
      var info=document.createElement('div');info.className='hero-info';
      info.innerHTML='<div class="hero-name">'+h.name+'</div><div class="hero-role">'+h.role+'</div>';
      card.appendChild(info);
      if(h.badge){var b=document.createElement('div');b.className='hero-badge';b.textContent=h.badge;card.appendChild(b);}
      grid.appendChild(card);
    })(i);
  }
}

function renderDots(){
  var ch=HEROES[curHero].chapters;
  var el=document.getElementById('sdots');
  el.innerHTML='';
  for(var i=0;i<ch.length;i++){
    var d=document.createElement('div');
    d.className='sdot'+(i===cur?' active':i<cur?' done':'');
    el.appendChild(d);
  }
  document.getElementById('chnum').textContent=(cur+1)+' / '+ch.length;
}

function renderChapter(){
  var c=HEROES[curHero].chapters[cur];
  c.draw(document.getElementById('scene-svg'));
  document.getElementById('ch-badge').textContent=c.badge;
  document.getElementById('ch-title').textContent=c.title;
  document.getElementById('ch-text').textContent=c.text;
  document.getElementById('fact-icon').textContent=c.icon;
  document.getElementById('fact-text').textContent=c.fact;
  document.getElementById('btn-prev').disabled=(cur===0);
  var nb=document.getElementById('btn-next');
  nb.disabled=(cur===HEROES[curHero].chapters.length-1);
  nb.textContent=cur===HEROES[curHero].chapters.length-1?'¡Fin! 🎉':'Siguiente →';
  renderDots();
  stopSpeaking();
}

function stopSpeaking(){
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  speaking=false;factSpeaking=false;
  var b=document.getElementById('btn-speak');
  b.classList.remove('speaking');
  b.innerHTML='<span style="font-size:16px">🔊</span><span id="speak-lbl"> Escuchar</span>';
  var fh=document.getElementById('fact-hint');
  if(fh)fh.innerHTML='<span style="font-size:14px">🔊</span> Tocá para escuchar el dato curioso';
}

function doSpeak(text, onEnd){
  if(!window.speechSynthesis){alert('Tu navegador no soporta texto a voz.');return;}
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang='es-AR';u.pitch=0.85;u.rate=0.92;u.volume=1;
  function go(){
    var vs=window.speechSynthesis.getVoices();
    var fns=[
      function(v){return v.lang.startsWith('es')&&/jorge|pablo|diego|carlos|miguel|male/i.test(v.name)&&!/female|femenin/i.test(v.name);},
      function(v){return v.lang==='es-AR';},
      function(v){return v.lang==='es-MX';},
      function(v){return v.lang==='es-ES';},
      function(v){return v.lang.startsWith('es');}
    ];
    for(var k=0;k<fns.length;k++){var m=vs.find(fns[k]);if(m){u.voice=m;break;}}
    u.onend=onEnd||stopSpeaking;
    u.onerror=stopSpeaking;
    window.speechSynthesis.speak(u);
  }
  if(window.speechSynthesis.getVoices().length>0){go();}
  else{window.speechSynthesis.onvoiceschanged=go;window.speechSynthesis.getVoices();}
}

function startHero(idx){
  curHero=idx; cur=0;
  document.getElementById('cover').classList.remove('active');
  document.getElementById('story').classList.add('active');
  renderChapter();
}

document.getElementById('btn-back').addEventListener('click',function(){
  stopSpeaking();
  document.getElementById('story').classList.remove('active');
  document.getElementById('cover').classList.add('active');
});

document.getElementById('btn-prev').addEventListener('click',function(){
  if(cur>0){cur--;renderChapter();}
});

document.getElementById('btn-next').addEventListener('click',function(){
  if(cur<HEROES[curHero].chapters.length-1){cur++;renderChapter();}
});

document.getElementById('btn-speak').addEventListener('click',function(){
  if(speaking){stopSpeaking();return;}
  var c=HEROES[curHero].chapters[cur];
  var b=document.getElementById('btn-speak');
  b.classList.add('speaking');
  b.innerHTML='<div style="display:flex;align-items:center;gap:3px;height:14px"><div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div></div><span style="margin-left:5px">Pausar</span>';
  speaking=true;
  doSpeak(c.title+'. '+c.text, stopSpeaking);
});

document.getElementById('fun-fact').addEventListener('click',function(){
  if(factSpeaking){stopSpeaking();return;}
  var c=HEROES[curHero].chapters[cur];
  var fh=document.getElementById('fact-hint');
  fh.innerHTML='<div style="display:flex;align-items:center;gap:3px;height:14px"><div class="wb" style="background:#f0d080"></div><div class="wb" style="background:#f0d080;animation-delay:.12s"></div><div class="wb" style="background:#f0d080;animation-delay:.24s"></div></div><span style="margin-left:5px;color:rgba(240,208,128,.7)">Escuchando...</span>';
  factSpeaking=true;
  doSpeak('Dato curioso: '+c.fact, stopSpeaking);
});

makeStar();
buildCards();

})();
</script>
